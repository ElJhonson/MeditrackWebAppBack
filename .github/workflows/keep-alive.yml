name: Keep Alive - MediTrackApp

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping MediTrackApp
        run: |
          for i in 1 2 3; do
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 60 \
              --retry 3 \
              --retry-delay 10 \
              --retry-all-errors \
              -X GET \
              https://meditrackwebappback.onrender.com/ping)
          
            echo "Ping $i - Status: $response"
          
            if [ "$response" = "200" ]; then
              echo "✅ API activa"
              exit 0
            fi
            sleep 90
          done
          echo "⚠️ API no respondió pero el servicio sigue activo en Render"
          exit 0